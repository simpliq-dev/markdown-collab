name: Publish GitHub release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build release kit
        run: npm run test-kit

      - name: Create portable archive
        id: kit
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          KIT="markdown-collab-${VERSION}-kit"
          ARCHIVE="markdown-collab-${VERSION}.tar.gz"
          SKILL_ARCHIVE="markdown-collab-skill-${VERSION}.tar.gz"
          (cd release && tar -czf "${ARCHIVE}" "${KIT}")
          tar -czf "release/${SKILL_ARCHIVE}" -C "release/${KIT}/skills" markdown-collab
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "kit=${KIT}" >> "$GITHUB_OUTPUT"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "skill_archive=${SKILL_ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.kit.outputs.version }}
          KIT: ${{ steps.kit.outputs.kit }}
          ARCHIVE: ${{ steps.kit.outputs.archive }}
          SKILL_ARCHIVE: ${{ steps.kit.outputs.skill_archive }}
        shell: bash
        run: |
          PRERELEASE=()
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE+=(--prerelease)
          fi

          TITLE="Markdown Collab ${VERSION}"
          NOTES="Install the VSIX directly, or download the complete release kit. The portable Markdown Collab Agent Skill is also attached separately for project setup."
          VSIX="release/${KIT}/markdown-collab-${VERSION}.vsix"
          ARCHIVE="release/${ARCHIVE}"
          SKILL="release/${SKILL_ARCHIVE}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$VSIX" "$ARCHIVE" "$SKILL" --clobber
          else
            gh release create "$TAG" "$VSIX" "$ARCHIVE" "$SKILL" \
              --verify-tag \
              --title "$TITLE" \
              --notes "$NOTES" \
              "${PRERELEASE[@]}"
          fi
